<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result | UPSS Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .report-card {
            background: white;
            border: 2px solid #333;
            padding: 30px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .school-header { border-bottom: 3px double #333; margin-bottom: 20px; padding-bottom: 10px; }
        @media print { .no-print { display: none; } .report-card { box-shadow: none; border: 1px solid #000; } }
    </style>
</head>
<body>

<div class="container">
    <div class="report-card mx-auto" style="max-width: 800px;">
        <div class="text-center school-header">
            <h1 class="fw-bold text-uppercase">UPSS Benin City</h1>
            <p class="mb-1">Continuous Assessment Report Sheet</p>
            <h5 id="displaySession" class="badge bg-dark">Session: 2025/2026</h5>
        </div>

        <div class="row mb-4">
            <div class="col-6">
                <p><strong>Name:</strong> <span id="studentName">---</span></p>
                <p><strong>Exam No:</strong> <span id="studentID">---</span></p>
            </div>
            <div class="col-6 text-end">
                <p><strong>Term:</strong> 2nd Term</p>
                <p><strong>Class:</strong> Kg 1 Gold</p>
            </div>
        </div>

        <table class="table table-bordered border-dark text-center">
            <thead class="table-light">
                <tr>
                    <th>Subject</th>
                    <th>CA (40)</th>
                    <th>Exam (60)</th>
                    <th>Total (100)</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody id="scoreTable">
                </tbody>
        </table>

        <div class="mt-4 p-3 bg-light border">
            <h6>Teacher's Remark: <span class="text-primary">An excellent performance, keep it up!</span></h6>
        </div>

        <div class="text-center mt-5 no-print">
            <button onclick="window.print()" class="btn btn-success me-2"><i class="fas fa-print"></i> Print Result</button>
            <a href="result.html" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</div>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // YOUR EXISTING CODE GOES HERE
    const firebaseConfig = { ... };
    firebase.initializeApp(firebaseConfig);
    // ...
</script>

<script>
    // 1. Paste your Firebase Config here
    const firebaseConfig = {
    apiKey: "AIzaSyATfeLlHqie9wvmVuOuhBL5BaBwdYIZC7w",
    authDomain: "result-checker-c7a19.firebaseapp.com",
    projectId: "result-checker-c7a19",
    storageBucket: "result-checker-c7a19.firebasestorage.app",
    messagingSenderId: "199064015810",
    appId: "1:199064015810:web:e11290cc380e0d9b463c5b"
  };
  
    // 2. Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();


   // 1. Grab the ID from the URL bar (e.g., ?id=BEC/66043)
const urlParams = new URLSearchParams(window.location.search);
const studentID = urlParams.get('id');

if (!studentID) {
    alert("Please login with a valid Exam Number.");
    window.location.href = 'result.html';
} else {
    // 2. Since LocalStorage is blocked, we fetch the data AGAIN using the ID
    // Note: Make sure 'db' and Firebase are initialized at the top of this file too!
    db.collection('result').where('examNo', '==', studentID).get()
    .then((query) => {
        if (query.empty) {
            alert("No student found with this ID.");
        }
        
        query.forEach(doc => {
            const data = doc.data();
            
            // 3. Update the HTML elements
            document.getElementById('studentName').innerText = data.name;
            document.getElementById('studentID').innerText = data.examNo;
            
            // 4. Fill the Table
            const mathScore = parseInt(data.math) || 0;
            const table = document.getElementById('scoreTable');
            
            table.innerHTML = `
                <tr>
                    <td class="text-start ps-3">Mathematics</td>
                    <td>30</td>
                    <td>${mathScore - 30}</td>
                    <td class="fw-bold">${mathScore}</td>
                    <td>${mathScore >= 70 ? 'A' : 'B'}</td>
                </tr>
            `;
        });
    })
    .catch((error) => {
        console.error("Firebase Error:", error);
    });
}
</script>

</body>
</html>
